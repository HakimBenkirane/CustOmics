[project]
site_name = "CostOmics"
repo_name = "HakimBenkirane/CustOmics"
repo_url = "https://github.com/HakimBenkirane/CustOmics"
site_url = "https://github.com/HakimBenkirane/CustOmics"
site_description = "CostOmics Documentation"
site_author = "Hakim Benkirane"
copyright = "Copyright &copy; 2026 Hakim Benkirane"


nav = [
  {"Home" = "index.md"},
  {"Getting Started"= "getting_started.md"},
  {"API"= [
     "api/train.md",
     "api/evaluate.md",
     "api/visualise.md"
  ]},
  {"Cite us" = "citation.md"}
]

[project.theme]
variant = "material"
language = "en"

features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.code.select",
    "search.highlight",
    "navigation.footer",
]

[project.theme.icon]
repo = "fontawesome/brands/git-alt"

[[project.theme.palette]]
scheme = "default"
primary =  "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"


[project.extra.version]
provider = "mike"

[project.plugins.mkdocstrings]
enabled = true

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
inherited_members = true
show_source = true
